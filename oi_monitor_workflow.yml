name: OI Signal Monitor

on:
  schedule:
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch:

jobs:
  check-oi:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout karo
        uses: actions/checkout@v4
      - name: Python setup karo
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Dependencies install karo
        run: pip install requests nsepython
      - name: OI Monitor run karo
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python oi_cloud_monitor.py
