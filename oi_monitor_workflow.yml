name: OI Signal Monitor

on:
  schedule:
    # Har 5 minute mein run karo — Market hours IST 9:15 AM to 3:30 PM
    # UTC mein: 3:45 AM to 10:00 AM (IST = UTC + 5:30)
    - cron: '*/5 3-10 * * 1-5'   # Monday to Friday only
  
  workflow_dispatch:               # Manual run bhi kar sako

jobs:
  check-oi:
    runs-on: ubuntu-latest
    
    steps:
      - name: Code checkout karo
        uses: actions/checkout@v4
      
      - name: Python setup karo
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Dependencies install karo
        run: pip install requests
      
      - name: OI Monitor run karo
        env:
          TELEGRAM_TOKEN:  ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python oi_cloud_monitor.py
